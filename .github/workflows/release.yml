name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck + tests
        run: |
          npm run typecheck
          npm test

      - name: Build production bundle
        run: npm run build

      - name: Verify manifest.json version matches tag
        run: |
          MANIFEST_VERSION=$(node -e "console.log(require('./manifest.json').version)")
          TAG="${GITHUB_REF_NAME}"
          echo "manifest version: $MANIFEST_VERSION"
          echo "tag: $TAG"
          if [ "$MANIFEST_VERSION" != "$TAG" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Verify versions.json contains the new version
        run: |
          MANIFEST_VERSION=$(node -e "console.log(require('./manifest.json').version)")
          node -e "
            const v = require('./versions.json');
            if (!v['$MANIFEST_VERSION']) {
              console.error('::error::versions.json is missing entry for $MANIFEST_VERSION');
              process.exit(1);
            }
          "

      - name: Create GitHub release with artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for what changed." \
            main.js manifest.json versions.json
